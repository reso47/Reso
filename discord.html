<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord – Reso</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        }
        body {
            background: #0f0f13;
            color: #ffffff;
            line-height: 1.7;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #ffffff;
            padding: 16px 30px;
            text-align: right;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 999;
        }
        nav a {
            color: #000000;
            text-decoration: none;
            margin-left: 25px;
            font-size: 1.05rem;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        nav a:hover {
            background: #000;
            color: #fff;
        }

        .inhalt {
            max-width: 750px;
            margin: 0 auto;
            padding: 120px 30px 80px;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        h2 {
            font-size: 2.2rem;
            margin-bottom: 2rem;
            color: #ffffff;
        }
        .info {
            font-size: 1.5rem;
            color: #b0b0c0;
            padding: 2.5rem;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            background: #12121a;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Start</a>
        <a href="ueber.html">Über mich</a>
    </nav>

    <div class="inhalt">
        <h2>Discord</h2>
        <div class="info">
            Discord Channel • Coming Soon<br>
            <span style="font-size: 1rem; color: #888899; margin-top: 1rem; display: block;">Hier gibt es bald eine Community für Fragen & Tipps</span>
        </div>
    </div>
</body>
</html>
